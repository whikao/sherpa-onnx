name: 编译 Sherpa-Onnx QNN 版本 (修复二进制)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取官方源码
      - name: Checkout sherpa-onnx
        uses: actions/checkout@v4
        with:
          repository: k2-fsa/sherpa-onnx
          submodules: 'recursive'

      # 2. 下载 NDK (使用 Android 官方 sdkmanager，确保精准指定 28.2.13676358)
      - name: Setup Android NDK
        run: |
          # 创建 Android SDK 目录（防止路径不存在）
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          
          # 如果还没下载过 sdkmanager，就下载并解压
          if [ ! -d "$ANDROID_HOME/cmdline-tools/latest/bin" ]; then
            wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip commandlinetools-linux-11076708_latest.zip
            mv cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
            rm commandlinetools-linux-11076708_latest.zip
            rm -rf cmdline-tools
          fi
          
          # 将 sdkmanager 加入当前环境变量
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          
          # 先静默接受所有许可协议（防止交互式死循环卡死）
          echo y | sdkmanager --licenses > /dev/null 2>&1
          
          # 精准安装指定版本的 NDK
          sdkmanager --install "ndk;28.2.13676358"
          
          # 设置环境变量，指向 NDK 目录
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV

      # 3. 下载 QNN SDK
      - name: Download QNN SDK
        run: |
          pip install gdown
          gdown 1mWBqYnpVw5coBF7x5ZTFxf93z0ERwE8H -O qnn-sdk.zip
          unzip qnn-sdk.zip -d qnn-sdk
          echo "QNN_SDK_PATH=${{ github.workspace }}/qnn-sdk" >> $GITHUB_ENV

      # 4. 运行官方脚本
      - name: Execute official build script
        run: |
          chmod +x ./build-android-arm64-v8a.sh
          
          # 智能检测 envsetup.sh
          if [ -f "$QNN_SDK_PATH/bin/envsetup.sh" ]; then
            source "$QNN_SDK_PATH/bin/envsetup.sh"
          else
            echo "正在自动查找 envsetup.sh ..."
            QNN_ENV_FILE=$(find $QNN_SDK_PATH -name "envsetup.sh" | head -n 1)
            if [ -n "$QNN_ENV_FILE" ]; then
              source "$QNN_ENV_FILE"
              echo "✅ 成功加载 QNN 环境文件: $QNN_ENV_FILE"
            fi
          fi
          
          # 开启 QNN 和 生成主程序
          export SHERPA_ONNX_ENABLE_QNN=ON
          export BUILD_SHARED_LIBS=ON
          export SHERPA_ONNX_ENABLE_BINARY=ON 
          
          # ✅ 平台版本保持 android-34 (NDK 28 可以完美支持)
          export SHERPA_ONNX_ANDROID_PLATFORM=latest
          
          # 运行官方脚本
          ./build-android-arm64-v8a.sh

      # 5. 打包提取产物
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sherpa-onnx-qnn-android-full
          path: |
            build-android-arm64-v8a/install/bin/
            build-android-arm64-v8a/install/lib/

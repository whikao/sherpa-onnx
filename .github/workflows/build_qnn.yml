name: 编译 Sherpa-Onnx QNN 版本 (官方脚本版)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取官方源码
      - name: Checkout sherpa-onnx
        uses: actions/checkout@v4
        with:
          repository: k2-fsa/sherpa-onnx
          submodules: 'recursive'

      # 2. 下载 NDK
      - name: Setup Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip android-ndk-r25c-linux.zip
          echo "ANDROID_NDK=${{ github.workspace }}/android-ndk-r25c" >> $GITHUB_ENV

      # 3. 下载 QNN SDK
      - name: Download QNN SDK
        run: |
          pip install gdown
          gdown 1i41yjT_CA05ahh3d0S5DVVrHU4lkl8zy -O qnn-sdk.zip
          unzip qnn-sdk.zip -d qnn-sdk
          echo "QNN_SDK_PATH=${{ github.workspace }}/qnn-sdk" >> $GITHUB_ENV

      # 4. 【核心】设置环境变量，然后调用官方脚本
      - name: Execute official build script
        run: |
          chmod +x ./build-android-arm64-v8a.sh
          
          # 提前加载 QNN 环境，这是官方脚本成功运行的必须条件
          source ${{ env.QNN_SDK_PATH }}/bin/envsetup.sh
          
          # 告诉脚本我们编译的是 QNN 版本，并且编的是共享库
          export SHERPA_ONNX_ENABLE_QNN=ON
          export BUILD_SHARED_LIBS=ON
          
          # 运行官方脚本
          ./build-android-arm64-v8a.sh

      # 5. 提取打包产物
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sherpa-onnx-qnn-android-official
          path: |
            build-android-arm64-v8a/install/bin/
            build-android-arm64-v8a/install/lib/
